apiVersion: apps/v1
kind: Deployment
metadata:
  name: pos-backend
  labels:
    app: pos-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pos-backend
  template:
    metadata:
      labels:
        app: pos-backend
    spec:
      containers:
      - name: pos-backend
        image: ghcr.io/your-org/brewwlabs-pos:latest
        ports:
        - containerPort: 8000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "8000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: pos-secrets
              key: DATABASE_URL
        - name: CONTROL_PLANE_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: pos-secrets
              key: CONTROL_PLANE_DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: pos-secrets
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: pos-secrets
              key: JWT_SECRET
        - name: CONTROL_PLANE_KMS_KEY
          valueFrom:
            secretKeyRef:
              name: pos-secrets
              key: CONTROL_PLANE_KMS_KEY
        - name: FRONTEND_URL
          value: "https://your-domain.com"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: uploads-pvc
      imagePullSecrets:
      - name: ghcr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: pos-backend-service
spec:
  selector:
    app: pos-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
